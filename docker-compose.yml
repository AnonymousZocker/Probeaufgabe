version: '3.8'
services:
  python:
    # build für localen image bau 
    # build: ./django
    image: anonymouszocker/probeaufgabe-django
    volumes:
      - .:/app
    environment:
      DJANGO_ALLOWED_HOSTS: "*"
    command: gunicorn --bind 0.0.0.0:8000 --chdir /app/django/djangotutorial mysite.wsgi:application
    networks:
      - proxy-net
  
  nodejs:
    image: anonymouszocker/probeaufgabe-nodejs
    # build für localen image bau 
    # build: ./nodejs
    networks:
      - proxy-net

  nginx:
    image: nginx:latest
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - python
      - nodejs
    networks:
      - proxy-net

networks:
  proxy-net:
    driver: bridge